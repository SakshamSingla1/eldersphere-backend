# ── Application ──────────────────────────────────────────────────────────
spring.application.name=eldersphere-admin-api
server.port=4000

# ── DataSource ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3307/eldersphere?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────
# admin-api is the ONLY module that runs Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Redis ─────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Quartz ────────────────────────────────────────────────────────────────
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# ── Actuator ──────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# ── Springdoc / Swagger ───────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Firebase ──────────────────────────────────────────────────────────────
# Place your Firebase service account JSON at this path
# Download from: Firebase Console → Project Settings → Service Accounts → Generate new private key
firebase.service-account-path=classpath:firebase-service-account.json

# ── JWT ───────────────────────────────────────────────────────────────────
# Secret: 48-byte random, Base64-encoded (384-bit) — HS256 minimum is 256-bit
jwt.secret=IPGmLyQlEXj7zNZTGX8HD9/sSdzYUlklpcU0OMn1BQwzCV9lYxx/Orsu84c6X0Ca
jwt.expiration=900000
jwt.refresh-expiration=604800000

# ── 2FA / TOTP ────────────────────────────────────────────────────────────
# 32-byte Base64 key for AES-256 TOTP secret encryption
totp.encryption-key=05IVO4hUW3j7F8DUt2wJk0uJIsPXL/RDHCnfvxBoyZ8=
totp.issuer=ElderSphere

# ── Mail ──────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:elderhive@gmail.com}
spring.mail.password=${MAIL_PASSWORD:bvckaggxiekohler}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.eldersphere=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=INFO
