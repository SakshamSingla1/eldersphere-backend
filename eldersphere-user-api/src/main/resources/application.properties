# ── Application ──────────────────────────────────────────────────────────
spring.application.name=eldersphere-user-api
server.port=5000

# ── DataSource ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3307/eldersphere?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────
# CRITICAL: user-api NEVER runs migrations — admin-api owns Flyway
spring.flyway.enabled=false

# ── Redis ─────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Actuator ──────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Springdoc / Swagger ───────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.eldersphere=DEBUG
logging.level.org.springframework.security=DEBUG
