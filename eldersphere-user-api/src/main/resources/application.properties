# ── Application ──────────────────────────────────────────────────────────
spring.application.name=eldersphere-user-api
server.port=5001

# ── DataSource ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3307/eldersphere?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────
# CRITICAL: user-api NEVER runs migrations — admin-api owns Flyway
spring.flyway.enabled=false

# ── Redis ─────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Actuator ──────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# ── Springdoc / Swagger ───────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Firebase ──────────────────────────────────────────────────────────────
firebase.service-account-path=classpath:firebase-service-account.json

# ── JWT ───────────────────────────────────────────────────────────────────
# Separate secret from admin-api — different signing key per service
jwt.secret=H28iRld6cCYbDjdnZ0JDBogWiG46VmC+cpJnEJ9IP4MWtpT0fmCTU2/SWWJB9iKi
jwt.expiration=900000
jwt.refresh-expiration=604800000

# ── 2FA / TOTP ────────────────────────────────────────────────────────────
# 32-byte Base64 key for AES-256 TOTP secret encryption
totp.encryption-key=s8sq7M4x7/m7V9gkOxUuD/+K9DJI/InoojaGK7DntfQ=
totp.issuer=ElderSphere

# ── Mail ──────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:elderhive@gmail.com}
spring.mail.password=${MAIL_PASSWORD:bvckaggxiekohler}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.eldersphere=DEBUG
logging.level.org.springframework.security=DEBUG
